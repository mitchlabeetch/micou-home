    const FALLBACK_CONTENT = {
      homepage: {
        support_email: DEFAULT_SUPPORT_EMAIL,
        donation_platform: "Liberapay",
        donation_url: ""
      }
    };

    let currentLang = "fr";
    let currentFilter = "all";
    let currentModel = { categories: FALLBACK_MODEL.categories, apps: FALLBACK_MODEL.apps, dashboard: { requestable_apps: [] } };
    let currentContent = FALLBACK_CONTENT;
    let modalAppId = null;

    function supportEmail() {
      return ((((currentContent || {}).homepage || {}).support_email) || DEFAULT_SUPPORT_EMAIL).trim() || DEFAULT_SUPPORT_EMAIL;
    }

    function donationUrl() {
      const configured = ((((currentContent || {}).homepage || {}).donation_url) || "").trim();
      return configured || `mailto:${supportEmail()}?subject=Contribution%20micou.org`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getLocalized(value, lang, fallback = "") {
      if (value && typeof value === "object") return value[lang] || value.en || value.fr || fallback;
      return value || fallback;
    }

    function getMeta(id) {
      const dynamic = currentModel.apps.find((a) => a.id === id);
      const staticMeta = APP_META[id] || {};
      const overrideMeta = APP_OVERRIDES[id] || {};
      if (!dynamic) return { ...staticMeta, ...overrideMeta };
      return {
        ...staticMeta,
        ...overrideMeta,
        badge: dynamic.badge || staticMeta.badge,
        icon: dynamic.icon_path || overrideMeta.icon || staticMeta.icon,
        art: dynamic.illustration_path || dynamic.icon_path || overrideMeta.art || staticMeta.art,
        features: Array.isArray(dynamic.features) ? dynamic.features : (overrideMeta.features || staticMeta.features),
        thanks: dynamic.thanks || overrideMeta.thanks || staticMeta.thanks,
        supported_languages: Array.isArray(dynamic.supported_languages) ? dynamic.supported_languages : (overrideMeta.supported_languages || staticMeta.supported_languages),
        card: dynamic.card || overrideMeta.card || staticMeta.card,
        detail: dynamic.detail || overrideMeta.detail || staticMeta.detail,
        replaces: dynamic.replaces || overrideMeta.replaces || staticMeta.replaces
      };
    }

    function getAppState(service) {
      const meta = getMeta(service.id);
      if (meta && meta.state === "build") return "build";
      const restricted = service.requires_request || service.access_mode === "restricted" || service.cta_mode === "request" || (service.cta_mode === "auto" && !service.allowed_for_viewer && service.access_mode !== "public");
      return restricted ? "request" : "public";
    }

    function getLocalizedAppText(service, field, lang, fallback = "") {
      const meta = getMeta(service.id);
      if (meta && meta[field]) return getLocalized(meta[field], lang, fallback);
      if (service[field]) return getLocalized(service[field], lang, fallback);
      return synthesizeAppText(service, field, lang, fallback);
    }

    function getFeatureLabels(service, lang) {
      const meta = getMeta(service.id);
      const terms = FEATURE_TERMS[lang] || FEATURE_TERMS.en;
      const keys = meta && Array.isArray(meta.features) ? meta.features : [];
      return keys.map((key) => terms[key]).filter(Boolean);
    }

    function getLanguagesFor(service) {
      const meta = getMeta(service.id);
      return meta && Array.isArray(meta.supported_languages) && meta.supported_languages.length ? meta.supported_languages : ["fr", "en", "de", "es"];
    }

    function getBadge(service) {
      const meta = getMeta(service.id);
      if (meta && meta.badge) return meta.badge;
      const source = getLocalized(service.name, "en", service.id || "AP");
      return source.replace(/[^A-Za-zÀ-ÿ0-9]/g, "").slice(0, 3).toUpperCase() || "AP";
    }

    function getArt(service) {
      const meta = getMeta(service.id);
      return (meta && meta.art) || getServiceIcon(service) || "illustrations/fairy-wand.png";
    }

    function getThanks(service) {
      const meta = getMeta(service.id);
      if (meta && meta.thanks && typeof meta.thanks === "object") return getLocalized(meta.thanks, currentLang, "");
      return localizeCreditsText(APP_CREDIT_NAMES[service.id] || (meta && meta.thanks) || "", currentLang);
    }

    function localizeCreditsText(text, lang) {
      if (!text || lang === "en") return text;
      return text
        .split(";")
        .map((token) => token.trim())
        .filter(Boolean)
        .map((token) => localizeCreditToken(token, lang))
        .join("; ");
    }

    function localizeCreditToken(token, lang) {
      return (CREDIT_TOKEN_TRANSLATIONS[lang] && CREDIT_TOKEN_TRANSLATIONS[lang][token]) || token;
    }

    function sentenceCase(value) {
      const normalized = String(value || "").trim();
      return normalized ? normalized.charAt(0).toLowerCase() + normalized.slice(1) : "";
    }

    function joinNaturalList(items, lang) {
      if (!items.length) return "";
      if (items.length === 1) return items[0];
      const conjunction = lang === "fr" ? "et" : lang === "de" ? "und" : lang === "es" ? "y" : "and";
      return `${items.slice(0, -1).join(", ")} ${conjunction} ${items[items.length - 1]}`;
    }

    function synthesizeAppText(service, field, lang, fallback = "") {
      const features = getFeatureLabels(service, lang).slice(0, 3);
      const featureList = joinNaturalList(features, lang);
      const rawDescription = getLocalized(service.description, lang, "");
      const categoryKey = service.category || "utilities";
      const categoryCopy = ((CATEGORY_COPY[lang] || CATEGORY_COPY.en)[categoryKey]) || ((CATEGORY_COPY.en || {}).utilities);
      const replacementCopy = ((REPLACEMENT_COPY[lang] || REPLACEMENT_COPY.en)[categoryKey]) || ((REPLACEMENT_COPY.en || {}).utilities);
      const name = getLocalized(service.name, lang, service.id);
      const baseDescription = rawDescription || (
        lang === "fr" ? `${name} aide à ${categoryCopy}.` :
        lang === "de" ? `${name} hilft dabei, ${categoryCopy}.` :
        lang === "es" ? `${name} sirve para ${categoryCopy}.` :
        `${name} helps you ${categoryCopy}.`
      );

      if (field === "card") return baseDescription;
      if (field === "detail") {
        if (lang === "fr") return [baseDescription, featureList ? `On y retrouve notamment ${featureList}.` : "", `C'est une alternative plus sobre à ${replacementCopy}.`].filter(Boolean).join(" ");
        if (lang === "de") return [baseDescription, featureList ? `Dazu gehören unter anderem ${featureList}.` : "", `So entsteht eine ruhigere Alternative zu ${replacementCopy}.`].filter(Boolean).join(" ");
        if (lang === "es") return [baseDescription, featureList ? `Incluye por ejemplo ${featureList}.` : "", `Así puede sustituir con más calma a ${replacementCopy}.`].filter(Boolean).join(" ");
        return [baseDescription, featureList ? `It covers ${featureList}.` : "", `That makes it a calmer alternative to ${replacementCopy}.`].filter(Boolean).join(" ");
      }
      if (field === "replaces") return replacementCopy;
      return fallback;
    }

    function getServiceIcon(service) {
      const meta = getMeta(service.id);
      if (meta && meta.icon) return meta.icon;
      if (service.icon_path) return service.icon_path;
      if (meta && typeof meta.art === "string" && meta.art.startsWith("illustrations/")) return meta.art;
      if (typeof service.art_path === "string" && service.art_path.startsWith("illustrations/")) return service.art_path;
      return "";
    }

    function renderServiceMark(service) {
      const fallback = escapeHtml(getBadge(service));
      const icon = getServiceIcon(service);
      if (!icon) return `<div class="service-mark fallback" data-fallback="${fallback}"></div>`;
      return `<div class="service-mark" data-fallback="${fallback}"><img loading="lazy" src="${escapeHtml(icon)}" alt="" onerror="this.parentElement.classList.add('fallback'); this.remove();"></div>`;
    }

    function renderFlags(langs) {
      return langs.map((lang) => `<span class="flag" role="img" aria-label="${escapeHtml(UI[lang].languageName)}" tabindex="0" data-tooltip="${escapeHtml(UI[lang].languageName)}"><img loading="lazy" src="${escapeHtml(FLAG_ASSETS[lang])}" alt=""></span>`).join("");
    }

    function normalizeModel(payload) {
      const sourceApps = payload && Array.isArray(payload.apps) && payload.apps.length ? payload.apps : FALLBACK_MODEL.apps;
      const sourceCategories = payload && payload.categories ? payload.categories : FALLBACK_MODEL.categories;
      const requestable = payload && payload.dashboard && Array.isArray(payload.dashboard.requestable_apps)
        ? payload.dashboard.requestable_apps.map((item) => item.id)
        : sourceApps.filter((item) => item.access_mode === "restricted").map((item) => item.id);
      const requestableSet = new Set(requestable);
      const categories = {};
      Object.entries(sourceCategories || {}).forEach(([id, category]) => { categories[id] = { id, ...(category || {}) }; });
      const apps = sourceApps
        .filter((item) => item && item.id && item.show_on_homepage !== false && item.access_mode !== "admin_only")
        .map((item) => ({ ...item, requires_request: item.requires_request || requestableSet.has(item.id) }))
        .sort((a, b) => {
          const categoryDelta = (categories[a.category]?.order || 9999) - (categories[b.category]?.order || 9999);
          if (categoryDelta) return categoryDelta;
          return String(getLocalized(a.name, "en", a.id)).localeCompare(String(getLocalized(b.name, "en", b.id)));
        });
      return { categories, apps, dashboard: { requestable_apps: apps.filter((app) => getAppState(app) === "request") } };
    }

    function setLang(lang) {
      currentLang = LANGS.includes(lang) ? lang : "fr";
      document.documentElement.lang = currentLang;

    function renderPage() {
      renderHeader();
      renderHero();
      renderServices();
      renderForm();
      renderFooter();
      document.getElementById("modal-close").setAttribute("aria-label", UI[currentLang].closeLabel);
      if (modalAppId) openModal(modalAppId);
      setupRevealAnimations();

    async function sha256Hex(input) {
      const data = new TextEncoder().encode(input);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map((value) => value.toString(16).padStart(2, "0")).join("");
    }

    async function solvePow(token, difficultyZeros) {
      const maxIterations = 250000;
      for (let counter = 0; counter < maxIterations; counter++) {
        const hash = await sha256Hex(`${token}:${counter}`);
        if (hash.startsWith("0".repeat(difficultyZeros))) return { token, counter, hash };
      }
      return null;
    }

    async function submitAccessRequest(payload, pow) {
      const body = pow ? { ...payload, pow } : payload;
      const res = await fetch("/api/access-request", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(body)
      });
      const text = await res.text();
      let json = null;
      try { json = text ? JSON.parse(text) : null; } catch (_) {}
      return { ok: res.ok, status: res.status, json };
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const copy = UI[currentLang];
      const submitButton = form.querySelector('button[type="submit"]');
      const statusEl = form.querySelector(".form-status");
      const services = Array.from(form.querySelectorAll('input[name="services"]:checked')).map((node) => node.value);
      const formData = new FormData(form);
      const scope = form.dataset.scope || "individual";
      const requests = [
        (formData.get("requests") || "").toString().trim(),
        scope !== "individual" ? `${copy.requestTypeLine}: ${scope}` : "",
        scope !== "individual" ? `${copy.teamNameLine}: ${(formData.get("team_name") || "").toString().trim() || "—"}` : "",
        scope !== "individual" ? `${copy.teamSizeLine}: ${(formData.get("team_size") || "").toString().trim() || "—"}` : ""
      ].filter(Boolean).join("\n");

      statusEl.className = "form-status";
      statusEl.textContent = "";
      statusEl.style.display = "none";
      if (!services.length) {
        statusEl.classList.add("error");
        statusEl.textContent = copy.selectServiceError;
        statusEl.style.display = "block";
        return false;
      }

      submitButton.disabled = true;
      submitButton.textContent = copy.sendingLabel;
      const payload = {
        language: currentLang,
        email: (formData.get("email") || "").toString().trim(),
        services,
        known_as: (formData.get("known_as") || "").toString().trim(),
        usage: (formData.get("usage") || "").toString().trim(),
        requests,
        request_scope: scope,
        team_name: (formData.get("team_name") || "").toString().trim(),
        team_size: (formData.get("team_size") || "").toString().trim()
      };

      try {
        let result = await submitAccessRequest(payload, null);
        if (result.status === 429 && result.json && result.json.pow_required) {
          const challengeRes = await fetch("/api/pow", { headers: { Accept: "application/json" } });
          const challenge = await challengeRes.json();
          const pow = await solvePow(challenge.token, challenge.difficulty_zeros || 4);
          if (pow) result = await submitAccessRequest(payload, pow);
        }
        if (result.ok) {
          form.reset();
          form.dataset.scope = "individual";
          document.querySelectorAll(".scope-btn").forEach((node) => node.classList.toggle("active", node.dataset.scope === "individual"));
          statusEl.classList.add("success");
          statusEl.textContent = copy.successLabel;
          statusEl.style.display = "block";
        } else {
          statusEl.classList.add("error");
          statusEl.textContent = (result.json && result.json.error) || copy.errorLabel;
          statusEl.style.display = "block";
        }
      } catch (_) {
        statusEl.classList.add("error");
        statusEl.textContent = copy.errorLabel;
        statusEl.style.display = "block";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = copy.submitLabel;
      }
      return false;
    }

    async function refreshCatalog() {
      try {
        const response = await fetch("/api/catalog", { headers: { Accept: "application/json" } });
        if (response.ok) {
          currentModel = normalizeModel(await response.json());
          renderPage();
          return;
        }
      } catch (_) {}
      currentModel = normalizeModel(FALLBACK_MODEL);
      renderPage();
    }

    async function refreshContent() {
      try {
        const response = await fetch("/api/content", { headers: { Accept: "application/json" } });
        if (response.ok) {
          const payload = await response.json();
          if (payload && typeof payload === "object") {
            currentContent = {
              ...FALLBACK_CONTENT,
              ...payload,
              homepage: {
                ...FALLBACK_CONTENT.homepage,
                ...((payload || {}).homepage || {})
              }
            };
            renderPage();
          }
        }
      } catch (_) {}
    }

    function setupRevealAnimations() {
      const nodes = Array.from(document.querySelectorAll(".reveal"));
      if (!nodes.length) return;
      if (!("IntersectionObserver" in window)) {
        nodes.forEach((node) => node.classList.add("reveal-visible"));
        return;
      }
      if (!window.__micouRevealObserver) {
        window.__micouRevealObserver = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("reveal-visible");
              window.__micouRevealObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });
      }
      nodes.forEach((node, index) => {
        node.style.transitionDelay = `${Math.min(index % 6, 5) * 45}ms`;
        if (!node.classList.contains("reveal-visible")) window.__micouRevealObserver.observe(node);
      });
    }

    function detectPreferredLanguage() {
      try {
        const stored = localStorage.getItem("micou_lang");
        if (LANGS.includes(stored)) return stored;
      } catch (_) {}
      const nav = (navigator.language || "fr").slice(0, 2).toLowerCase();
      return LANGS.includes(nav) ? nav : "fr";
    }

    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("service-modal").addEventListener("click", (event) => {
      if (event.target.id === "service-modal") closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalAppId) closeModal();
    });

    currentLang = detectPreferredLanguage();
    renderPage();
    refreshCatalog();
    refreshContent();
  </script>
