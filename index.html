<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>micou.org</title>
  <link rel="icon" type="image/svg+xml" href="illustrations/svgmicoulogo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #faf8f3;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: rgba(255, 255, 255, 0.97);
      --text-color: #171717;
      --muted: #4b5563;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-green: #16a34a;
      --accent-orange: #f97316;
      --accent-blue: #2563eb;
      --accent-red: #dc2626;
      --accent-yellow: #eab308;
      --border-width: 4px;
      --shadow-offset: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: "Merriweather", Georgia, serif;
      line-height: 1.65;
      position: relative;
    }

    a {
      color: inherit;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    summary:focus-visible {
      outline: 3px solid var(--accent-orange);
      outline-offset: 3px;
    }

    .bg-mosaic {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-mosaic img {
      position: absolute;
      opacity: 0.16;
      filter: grayscale(24%);
    }

    .bg-mosaic img:nth-child(1) { top: 5%; left: 3%; width: 120px; transform: rotate(-15deg); }
    .bg-mosaic img:nth-child(2) { top: 15%; right: 5%; width: 80px; transform: rotate(20deg); }
    .bg-mosaic img:nth-child(3) { top: 25%; left: 8%; width: 100px; transform: rotate(10deg); }
    .bg-mosaic img:nth-child(4) { top: 35%; right: 10%; width: 90px; transform: rotate(-25deg); }
    .bg-mosaic img:nth-child(5) { top: 45%; left: 2%; width: 70px; transform: rotate(5deg); }
    .bg-mosaic img:nth-child(6) { top: 55%; right: 3%; width: 110px; transform: rotate(-10deg); }
    .bg-mosaic img:nth-child(7) { top: 65%; left: 12%; width: 85px; transform: rotate(30deg); }
    .bg-mosaic img:nth-child(8) { top: 75%; right: 8%; width: 95px; transform: rotate(-5deg); }
    .bg-mosaic img:nth-child(9) { top: 85%; left: 5%; width: 75px; transform: rotate(15deg); }
    .bg-mosaic img:nth-child(10) { top: 10%; left: 40%; width: 60px; transform: rotate(-20deg); }
    .bg-mosaic img:nth-child(11) { top: 30%; right: 25%; width: 70px; transform: rotate(8deg); }
    .bg-mosaic img:nth-child(12) { top: 50%; left: 30%; width: 55px; transform: rotate(-12deg); }
    .bg-mosaic img:nth-child(13) { top: 70%; right: 35%; width: 65px; transform: rotate(25deg); }
    .bg-mosaic img:nth-child(14) { top: 90%; left: 50%; width: 80px; transform: rotate(-8deg); }
    .bg-mosaic img:nth-child(15) { top: 20%; right: 45%; width: 50px; transform: rotate(18deg); }

    .container {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    header {
      border: var(--border-width) solid var(--text-color);
      background: var(--surface-strong);
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--accent-purple);
      padding: 20px 28px 74px;
      margin-bottom: 26px;
      position: relative;
      overflow: clip;
    }

    header::after {
      content: "";
      position: absolute;
      top: -10px;
      right: 14px;
      width: 96px;
      height: 96px;
      background: url("illustrations/rose-purple-sparkle.gif") center/contain no-repeat;
      opacity: 0.95;
      pointer-events: none;
    }

    .header-utility {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 18px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .header-brand {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hosting-badge {
      position: absolute;
      right: 24px;
      bottom: 16px;
      width: min(190px, 18vw);
      max-width: 190px;
      height: auto;
      flex: 0 0 auto;
      filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.22));
      z-index: 1;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.08em;
      margin-bottom: 0;
    }

    .tagline {
      font-family: "Space Mono", monospace;
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-purple);
      letter-spacing: 0.08em;
    }

    .hero-card,
    .services-shell,
    .form-shell,
    footer {
      border: var(--border-width) solid var(--text-color);
      background: var(--surface);
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--text-color);
      margin-bottom: 26px;
    }

    .hero-card {
      padding: 28px;
      display: grid;
      gap: 24px;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
    }

    .hero-top {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: center;
      gap: 26px;
      margin-bottom: 4px;
      text-align: center;
    }

    .hero-copy h2 {
      font-size: clamp(1.9rem, 4vw, 3.35rem);
      line-height: 0.95;
      text-align: center;
    }

    .hero-copy .hero-welcome {
      width: min(420px, 38vw);
      height: auto;
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(4px 6px 0 rgba(0, 0, 0, 0.18));
    }

    .hero-copy .hero-title-text {
      display: inline-block;
      max-width: 6ch;
      line-height: 0.96;
    }

    .section-heading img {
      width: auto;
      height: 34px;
      max-height: 34px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .hero-copy p {
      text-align: center;
      max-width: 980px;
      margin: 0 auto;
      font-size: 1rem;
    }

    .hero-copy p + p {
      margin-top: 0;
    }

    .lang-switcher {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 8px;
      max-width: 390px;
    }

    .lang-btn {
      border: 3px solid var(--text-color);
      background: white;
      box-shadow: 3px 3px 0 var(--text-color);
      padding: 7px 11px;
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .lang-btn:hover,
    .lang-btn:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--text-color);
      outline: none;
    }

    .lang-btn.active {
      background: var(--accent-purple);
      color: white;
      box-shadow: 4px 4px 0 var(--accent-pink);
    }

    .cta-row,
    .service-buttons,
    .scope-row,
    .category-nav,
    .service-meta,
    .modal-meta,
    .modal-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .cta-row {
      justify-content: center;
      gap: 14px;
    }

    .action-btn,
    .access-btn,
    .modal-btn,
    .contribute-btn,
    .scope-btn,
    .category-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: var(--border-width) solid var(--text-color);
      text-decoration: none;
      font-family: "Space Mono", monospace;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--text-color);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease;
      padding: 12px 18px;
      background: white;
      color: var(--text-color);
      line-height: normal;
    }

    .mini-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 3px solid var(--text-color);
      font-family: "Space Mono", monospace;
      font-size: 1.9rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--text-color);
      background: white;
      color: var(--text-color);
      padding: 0;
      line-height: 1;
    }

    .action-btn:hover,
    .access-btn:hover,
    .modal-btn:hover,
    .contribute-btn:hover,
    .scope-btn:hover,
    .category-btn:hover,
    .mini-toggle:hover,
    .action-btn:focus-visible,
    .access-btn:focus-visible,
    .modal-btn:focus-visible,
    .contribute-btn:focus-visible,
    .scope-btn:focus-visible,
    .category-btn:focus-visible,
    .mini-toggle:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--text-color);
      outline: none;
    }

    .action-btn.primary,
    .access-btn.primary,
    .contribute-btn,
    .scope-btn.active,
    .category-btn.active {
      background: var(--accent-green);
      color: white;
    }

    .access-btn.public {
      background: var(--accent-green);
      color: white;
    }

    .access-btn.request {
      background: #fde68a;
      color: #7c2d12;
    }

    .access-btn.build {
      background: #fecaca;
      color: #7f1d1d;
    }

    .principles-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .principle-card {
      border: 3px solid var(--text-color);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 4px 4px 0 var(--accent-blue);
      padding: 16px;
      display: grid;
      gap: 6px;
    }

    .principle-card:nth-child(2) { box-shadow: 4px 4px 0 var(--accent-orange); }
    .principle-card:nth-child(3) { box-shadow: 4px 4px 0 var(--accent-pink); }

    .principle-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .principle-head img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .principle-footnote {
      border: 3px dashed var(--text-color);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.85rem;
      line-height: 1.52;
      text-align: justify;
    }

    .support-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      border: var(--border-width) solid var(--text-color);
      background: #fff3d6;
      box-shadow: 4px 4px 0 var(--accent-orange);
      padding: 18px;
    }

    .support-box p {
      font-size: 0.9rem;
      line-height: 1.46;
      text-align: justify;
    }

    .support-box h3 {
      font-size: 1.12rem;
      margin-bottom: 10px;
    }

    .charter-shell {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .charter-shell h3 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      text-align: center;
    }

    .charter-shell h3 img {
      width: auto;
      height: 34px;
      object-fit: contain;
    }

    .charter-item {
      border: 3px solid var(--text-color);
      background: white;
      box-shadow: 4px 4px 0 var(--accent-yellow);
      overflow: hidden;
    }

    .charter-item summary {
      list-style: none;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }

    .charter-item summary::-webkit-details-marker {
      display: none;
    }

    .charter-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      min-width: 0;
    }

    .charter-copy {
      padding: 0 16px 18px;
      color: var(--muted);
    }

    .charter-item[open] .charter-copy {
      padding-top: 22px;
    }

    .charter-item[open] .mini-toggle {
      font-size: 0;
    }

    .charter-item[open] .mini-toggle::before {
      content: "-";
      font-size: 1.9rem;
      line-height: 1;
    }

    .charter-title strong {
      font-size: 1.02rem;
      line-height: 1.3;
    }

    .services-shell,
    .form-shell,
    footer {
      padding: 22px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      text-align: center;
    }

    .section-heading h2 {
      font-size: clamp(1.35rem, 3vw, 2rem);
    }

    .section-heading p {
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1 1 100%;
    }

    .info-pill,
    .feature-pill,
    .language-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 3px solid var(--text-color);
      background: white;
      padding: 8px 12px;
      box-shadow: 3px 3px 0 var(--text-color);
      font-family: "Space Mono", monospace;
      font-size: 0.76rem;
    }

    .info-pill img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .services-grid {
      display: grid;
      gap: 22px;
    }

    .category-nav {
      margin-bottom: 18px;
    }

    .service-category {
      display: grid;
      gap: 16px;
    }

    .service-category-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .service-category-title {
      font-size: 1.18rem;
      font-weight: 900;
    }

    .service-category-count {
      font-family: "Space Mono", monospace;
      font-size: 0.78rem;
      text-transform: uppercase;
      color: var(--muted);
    }

    .service-category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .service-card {
      display: grid;
      gap: 16px;
      border: var(--border-width) solid var(--text-color);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 5px 5px 0 var(--accent-purple);
      padding: 18px;
      min-height: 100%;
    }

    .service-card.public {
      box-shadow: 5px 5px 0 var(--accent-blue);
    }

    .service-card.request {
      box-shadow: 5px 5px 0 var(--accent-orange);
      background: linear-gradient(180deg, rgba(255, 252, 239, 0.98), rgba(255, 246, 214, 0.98));
    }

    .service-card.build {
      box-shadow: 5px 5px 0 var(--accent-red);
      background: linear-gradient(180deg, rgba(255, 245, 245, 0.98), rgba(254, 226, 226, 0.98));
    }

    .service-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .service-mark {
      width: 62px;
      height: 62px;
      border: 3px solid var(--text-color);
      box-shadow: 4px 4px 0 var(--accent-pink);
      background: linear-gradient(135deg, #fff3cd 0%, #fbcfe8 100%);
      display: grid;
      place-items: center;
      font-family: "Space Mono", monospace;
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .service-card.public .service-mark {
      background: linear-gradient(135deg, #dcfce7 0%, #dbeafe 100%);
    }

    .service-card.request .service-mark {
      background: linear-gradient(135deg, #fff3cd 0%, #fed7aa 100%);
    }

    .service-card.build .service-mark {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    }

    .service-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
      position: relative;
      z-index: 1;
    }

    .service-mark.fallback::after {
      content: attr(data-fallback);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 4px;
      text-align: center;
      line-height: 1;
      z-index: 0;
    }

    .service-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .service-head h3 {
      font-size: 1.15rem;
      line-height: 1.2;
      margin-bottom: 0;
    }

    .service-intro {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .service-title-meta {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .service-title-status {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .service-title-status img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .service-feature-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .service-preview-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border: 2px solid var(--text-color);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 2px 2px 0 var(--text-color);
      font-family: "Space Mono", monospace;
      font-size: 0.69rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .service-replaces {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .info-pill.request {
      background: #fff3cd;
    }

    .info-pill.public {
      background: #dcfce7;
    }

    .info-pill.build {
      background: #fee2e2;
    }

    .language-flags {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 14px;
      border: 2px solid var(--text-color);
      image-rendering: pixelated;
      box-shadow: 2px 2px 0 var(--text-color);
      position: relative;
      background: #ddd;
      flex-shrink: 0;
      z-index: 0;
    }

    .flag img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      image-rendering: pixelated;
    }

    /* Neobrutalist Tooltips */
    [data-tooltip] {
      position: relative;
      cursor: help;
    }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: #ffff00;
      color: var(--text-color);
      border: 3px solid var(--text-color);
      box-shadow: 3px 3px 0 var(--text-color);
      padding: 4px 8px;
      white-space: nowrap;
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      font-weight: 700;
      visibility: hidden;
      opacity: 0;
      transition: all 0.15s ease;
      z-index: 1000;
      pointer-events: none;
    }
    [data-tooltip]:hover::after {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(-12px);
    }

    [data-tooltip]:focus-visible::after {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(-12px);
    }

    .service-thanks {
      font-size: 0.83rem;
      color: var(--muted);
      border-top: 2px dashed rgba(23, 23, 23, 0.25);
      padding-top: 10px;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
    }

    .modal-root.open {
      display: flex;
    }

    .modal-card {
      width: min(920px, 100%);
      max-height: min(88vh, 920px);
      overflow: auto;
      border: var(--border-width) solid var(--text-color);
      background: var(--surface-strong);
      box-shadow: 8px 8px 0 var(--text-color);
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
    }

    .modal-title-wrap {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .modal-close {
      width: 46px;
      height: 46px;
      border: var(--border-width) solid var(--text-color);
      box-shadow: 4px 4px 0 var(--text-color);
      background: white;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .modal-body {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.9fr);
      gap: 20px;
    }

    .modal-story {
      display: grid;
      gap: 14px;
    }

    .modal-preview {
      border: var(--border-width) solid var(--text-color);
      background: #f8fafc;
      box-shadow: 5px 5px 0 var(--accent-blue);
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .modal-preview-figure {
      min-height: 220px;
      border: 3px solid var(--text-color);
      background: linear-gradient(135deg, #fff8df 0%, #fce7f3 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .modal-preview-figure img {
      width: min(200px, 85%);
      object-fit: contain;
      filter: drop-shadow(4px 4px 0 rgba(0, 0, 0, 0.22));
    }

    .modal-preview-note {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form-shell {
      display: grid;
      gap: 16px;
    }

    .form-intro {
      color: var(--muted);
      max-width: 760px;
    }

    .request-form {
      display: grid;
      gap: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field,
    .field-wide {
      display: grid;
      gap: 6px;
    }

    .field-wide {
      grid-column: 1 / -1;
    }

    .field label,
    .field-wide label {
      font-weight: 700;
    }

    .field input,
    .field-wide input,
    .field-wide textarea {
      width: 100%;
      border: var(--border-width) solid var(--text-color);
      background: white;
      padding: 12px 14px;
      box-shadow: 4px 4px 0 rgba(23, 23, 23, 0.14);
    }

    .field-wide textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field-hint {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .field-subhint {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .services-selection {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .service-choice {
      position: relative;
    }

    .service-choice input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .service-choice label {
      display: grid;
      gap: 4px;
      min-width: 180px;
      border: 3px solid var(--text-color);
      background: white;
      padding: 10px 12px;
      box-shadow: 3px 3px 0 var(--text-color);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .service-choice input:checked + label {
      background: #dcfce7;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--text-color);
    }

    .service-choice-title {
      font-weight: 700;
    }

    .service-choice-meta {
      font-family: "Space Mono", monospace;
      font-size: 0.74rem;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-project-note {
      margin-top: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.52;
    }

    .team-only {
      display: none;
    }

    .request-form[data-scope="team"] .team-only {
      display: grid;
    }

    .form-status {
      display: none;
      border: 3px solid var(--text-color);
      padding: 12px 14px;
      font-family: "Space Mono", monospace;
      background: white;
    }

    .form-status.success {
      display: block;
      background: #dcfce7;
      border-color: var(--accent-green);
    }

    .form-status.error {
      display: block;
      background: #fee2e2;
      border-color: var(--accent-red);
    }

    footer {
      text-align: center;
      display: grid;
      gap: 12px;
    }

    footer .footer-icons {
      display: flex;
      justify-content: center;
      gap: 14px;
      align-items: center;
    }

    footer .footer-icons img {
      height: 30px;
      width: auto;
      object-fit: contain;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.reveal-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .modal-body,
      .support-box,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .lang-switcher {
        justify-content: center;
      }

      .principles-row {
        grid-template-columns: 1fr;
      }

      .header-utility,
      .hero-top {
        justify-content: center;
      }

      .header-utility {
        flex-direction: column;
        align-items: center;
      }

      .hosting-badge {
        position: static;
        width: min(180px, 44vw);
        margin: 6px auto 0;
      }

      header {
        padding-bottom: 26px;
      }
    }

    @media (max-width: 720px) {
      .container {
        width: min(100%, calc(100% - 18px));
      }

      header,
      .hero-card,
      .services-shell,
      .form-shell,
      footer {
        padding: 18px;
      }

      .service-category-grid {
        grid-template-columns: 1fr;
      }

      .action-btn,
      .access-btn,
      .modal-btn,
      .contribute-btn,
      .scope-btn,
      .category-btn {
        width: 100%;
      }

      .cta-row,
      .service-buttons,
      .scope-row {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-top {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .hero-copy .hero-welcome {
        width: min(280px, 74vw);
        margin: 0 auto;
      }

      .hero-copy .hero-title-text {
        max-width: none;
      }

      .hero-copy p {
        font-size: 0.95rem;
      }

      .support-box p,
      .principle-footnote {
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      header::after {
        width: 82px;
        height: 82px;
        top: -8px;
        right: -8px;
      }

      .hero-card,
      .services-shell,
      .form-shell,
      footer {
        overflow: hidden;
      }
    }
  </style>

    const APP_META = {
      onlyoffice: { badge: "OO", art: "illustrations/decor-chandelier-gold.gif", features: ["docs", "sheets", "slides"], thanks: "OnlyOffice, Ascensio, the upstream contributors, and the YunoHost packaging community.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Rédigez, corrigez et partagez des documents, tableurs et présentations dans un même espace protégé.", en: "Write, revise, and share documents, spreadsheets, and presentations in one protected workspace.", de: "Dokumente, Tabellen und Präsentationen in einem geschützten gemeinsamen Raum bearbeiten.", es: "Redacta, corrige y comparte documentos, hojas y presentaciones en un mismo espacio protegido." }, detail: { fr: "Ornitoffice permet de travailler à plusieurs sur des fichiers bureautiques sans passer par Google Docs ou Microsoft 365. C’est utile pour les collectifs qui veulent garder la main sur leurs documents de travail et leurs archives.", en: "Ornitoffice lets several people work on office files without relying on Google Docs or Microsoft 365. It is useful for collectives that want to keep control over working documents and archives.", de: "Mit Ornitoffice können mehrere Personen gemeinsam an Bürodateien arbeiten, ohne Google Docs oder Microsoft 365 zu nutzen. Das eignet sich für Kollektive, die ihre Arbeitsdokumente und Archive selbst kontrollieren möchten.", es: "Ornitoffice permite trabajar en grupo sobre archivos de oficina sin depender de Google Docs ni de Microsoft 365. Resulta útil para colectivos que quieren conservar el control de sus documentos y archivos." }, replaces: { fr: "Google Docs, Google Sheets, Microsoft 365 en ligne.", en: "Google Docs, Google Sheets, online Microsoft 365.", de: "Google Docs, Google Sheets, Microsoft 365 im Browser.", es: "Google Docs, Google Sheets, Microsoft 365 en línea." } },
      vikunja: { badge: "VK", art: "illustrations/fairy-wand.png", features: ["tasks", "kanban", "planning"], thanks: "Vikunja and the free software maintainers who keep calm project planning possible.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Structurez des listes, des tableaux et des échéances pour suivre un projet sans interface managériale lourde.", en: "Organize lists, boards, and deadlines for projects without a heavy managerial interface.", de: "Listen, Boards und Fristen für Projekte organisieren, ohne schwerfällige Management-Oberfläche.", es: "Organiza listas, tableros y fechas para proyectos sin una interfaz de gestión pesada." }, detail: { fr: "Vikunja aide à répartir les tâches, visualiser l’avancement et garder une vue claire sur les priorités d’une équipe ou d’un projet personnel. L’outil reste sobre et très pratique pour sortir des plateformes de productivité invasives.", en: "Vikunja helps distribute tasks, visualize progress, and keep priorities clear for a team or a personal project. It stays lightweight and practical for leaving invasive productivity platforms behind.", de: "Vikunja hilft dabei, Aufgaben zu verteilen, Fortschritt sichtbar zu machen und Prioritäten in Teams oder persönlichen Projekten klar zu halten. Das Werkzeug bleibt leichtgewichtig und praktisch.", es: "Vikunja ayuda a repartir tareas, visualizar el avance y mantener claras las prioridades de un equipo o de un proyecto personal. Sigue siendo ligera y muy práctica para salir de plataformas invasivas de productividad." }, replaces: { fr: "Trello, Todoist, Asana pour les usages simples.", en: "Trello, Todoist, or Asana for simpler setups.", de: "Trello, Todoist oder Asana für einfachere Setups.", es: "Trello, Todoist o Asana para usos más sencillos." } },
      nodebb: { badge: "FB", art: "illustrations/heart-wreath-roses.gif", features: ["threads", "archives", "moderation"], thanks: "NodeBB, its plugin ecosystem, and everyone who still builds public discussion spaces.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Ouvrez des discussions qui restent lisibles dans le temps, avec des catégories, de la modération et de la mémoire collective.", en: "Host discussions that remain readable over time, with categories, moderation, and collective memory.", de: "Diskussionen führen, die langfristig lesbar bleiben, mit Kategorien, Moderation und kollektivem Gedächtnis.", es: "Aloja conversaciones que siguen siendo legibles con el tiempo, con categorías, moderación y memoria colectiva." }, detail: { fr: "Le Forum sert à faire vivre des discussions plus durables que des fils de chat. Il permet de poser des questions, documenter des réponses et garder des traces utiles pour un groupe, un projet ou une communauté élargie.", en: "Le Forum is meant for conversations that deserve more durability than chat threads. It helps ask questions, document answers, and keep useful traces for a group, project, or broader community.", de: "Le Forum ist für Gespräche gedacht, die mehr Dauer brauchen als Chat-Verläufe. Fragen, Antworten und nützliche Spuren für Gruppen, Projekte oder Communities bleiben dort auffindbar.", es: "Le Forum está pensado para conversaciones que merecen más duración que un chat. Ayuda a plantear preguntas, documentar respuestas y conservar rastros útiles para un grupo, proyecto o comunidad." }, replaces: { fr: "Des groupes Facebook, des salons Discord éphémères, des listes de messages dispersées.", en: "Facebook groups, ephemeral Discord channels, scattered message threads.", de: "Facebook-Gruppen, vergängliche Discord-Kanäle, verstreute Nachrichtenfäden.", es: "Grupos de Facebook, canales efímeros de Discord, hilos dispersos de mensajes." } },
      agora: { badge: "AG", art: "illustrations/rose-red.gif", features: ["threads", "archivesDocs", "knowledgeBase"], thanks: "Agora, its maintainers, and the people building shared digital spaces that do not depend on extractive collaboration suites.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Rassemblez échanges, documents et repères communs dans un espace partagé pensé pour la vie d’un collectif.", en: "Bring discussions, documents, and shared reference points together in one space built for collective work.", de: "Gespräche, Dokumente und gemeinsame Bezugspunkte in einem Raum bündeln, der für kollektive Arbeit gedacht ist.", es: "Reúne conversaciones, documentos y referencias comunes en un espacio pensado para la vida de un colectivo." }, detail: { fr: "Agora sert à structurer des échanges, centraliser des ressources utiles et garder des traces de travail pour un groupe, une association ou un projet. C’est pratique quand on veut sortir des suites fermées où les discussions et documents se dispersent vite.", en: "Agora helps structure discussions, centralize useful resources, and keep working traces for a group, association, or project. It is useful when you want to leave closed suites where conversations and documents quickly get scattered.", de: "Agora hilft dabei, Austausch zu strukturieren, nützliche Ressourcen zu zentralisieren und Arbeitsspuren für Gruppen, Vereine oder Projekte zu bewahren. Das ist besonders hilfreich, wenn geschlossene Suiten Gespräche und Dokumente zerstreuen.", es: "Agora sirve para estructurar conversaciones, centralizar recursos útiles y conservar huellas de trabajo para un grupo, una asociación o un proyecto. Resulta útil cuando se quiere salir de suites cerradas donde las conversaciones y documentos se dispersan enseguida." }, replaces: { fr: "Des espaces de travail fermés où discussions, fichiers et repères restent éparpillés.", en: "Closed workspaces where discussions, files, and references stay fragmented.", de: "Geschlossene Arbeitsräume, in denen Gespräche, Dateien und Bezugspunkte zerstreut bleiben.", es: "Espacios de trabajo cerrados donde conversaciones, archivos y referencias quedan fragmentados." } },
      ihatemoney: { badge: "HM", art: "illustrations/icon-strawberry-basket.png", features: ["expenses", "balances", "groupBudget"], thanks: "I Hate Money and the people maintaining small, clear tools for collective life.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Répartissez des dépenses partagées simplement, sans feuille de calcul bricolée ni appli commerciale envahissante.", en: "Split shared expenses simply, without improvised spreadsheets or intrusive commercial apps.", de: "Gemeinsame Ausgaben einfach aufteilen, ohne improvisierte Tabellen oder aufdringliche Kommerz-Apps.", es: "Reparte gastos compartidos de forma sencilla, sin hojas improvisadas ni aplicaciones comerciales invasivas." }, detail: { fr: "I Hate Money permet de suivre qui a payé quoi, équilibrer un budget de colocation, de collectif ou d’événement, et éviter les calculs manuels à chaque dépense. C’est volontairement simple et lisible.", en: "I Hate Money helps track who paid what, balance a shared budget for housing, collectives, or events, and avoid manual calculations every time money moves. It stays deliberately simple and readable.", de: "I Hate Money hilft dabei nachzuvollziehen, wer was bezahlt hat, ein gemeinsames Budget auszugleichen und manuelle Rechnerei zu vermeiden. Das Werkzeug bleibt bewusst einfach und gut lesbar.", es: "I Hate Money permite seguir quién ha pagado qué, equilibrar un presupuesto compartido de vivienda, colectivo o evento y evitar cálculos manuales cada vez que hay un gasto. Se mantiene deliberadamente simple." }, replaces: { fr: "Splitwise ou les tableaux bricolés pour les dépenses partagées.", en: "Splitwise or improvised spreadsheets for shared expenses.", de: "Splitwise oder improvisierte Tabellen für geteilte Ausgaben.", es: "Splitwise o las hojas improvisadas para gastos compartidos." } },
      whitebophir: { badge: "TB", art: "illustrations/icon-watering-can.gif", features: ["whiteboard", "sketches", "facilitation"], thanks: "WBO / WhiteBophir and everyone building low-friction collaborative drawing tools.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Dessinez ensemble, animez un atelier ou posez un schéma sans créer de compte complexe.", en: "Draw together, facilitate a workshop, or sketch quickly without a heavy account setup.", de: "Gemeinsam zeichnen, Workshops begleiten oder schnell skizzieren, ohne komplizierte Konten.", es: "Dibuja en grupo, facilita un taller o esboza algo rápido sin una cuenta compleja." }, detail: { fr: "Tablo ouvre un grand tableau blanc partagé, utile pour des réunions, des ateliers, des cartes mentales ou des explications visuelles improvisées. Le service va à l’essentiel et fonctionne bien pour des usages rapides.", en: "Tablo opens a shared whiteboard that works well for meetings, workshops, mind maps, or improvised visual explanations. It focuses on the essentials and is especially useful for quick collaborative sessions.", de: "Tablo bietet ein gemeinsames Whiteboard für Meetings, Workshops, Mindmaps oder spontane visuelle Erklärungen. Es konzentriert sich auf das Wesentliche und eignet sich gut für schnelle Zusammenarbeit.", es: "Tablo abre una pizarra compartida útil para reuniones, talleres, mapas mentales o explicaciones visuales improvisadas. Se centra en lo esencial y funciona muy bien para usos rápidos." }, replaces: { fr: "Miro, Jamboard ou un écran partagé juste pour gribouiller ensemble.", en: "Miro, Jamboard, or screen-sharing just to draw together.", de: "Miro, Jamboard oder Bildschirmteilen nur zum gemeinsamen Skizzieren.", es: "Miro, Jamboard o compartir pantalla solo para dibujar en grupo." } },
      pretix: { badge: "BT", art: "illustrations/text-links-3d.gif", features: ["tickets", "registrations", "checkin"], thanks: "pretix, its maintainers, and the people building ethical event infrastructure.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Préparez des inscriptions, des billets et des jauges pour un événement sans passer par une billetterie extractive.", en: "Prepare registrations, tickets, and attendance limits for an event without an extractive ticketing platform.", de: "Anmeldungen, Tickets und Kapazitäten für Veranstaltungen organisieren, ohne ausbeuterische Ticketplattformen.", es: "Prepara inscripciones, entradas y aforos sin pasar por una plataforma de billettería extractiva." }, detail: { fr: "Billetterie permet de publier des événements, gérer les inscriptions, envoyer les confirmations et organiser l’accueil. C’est particulièrement utile pour garder la main sur les données de participation et les flux d’entrée.", en: "Billetterie helps publish events, manage registrations, send confirmations, and organize admission. It is especially useful when you want to keep control over attendance data and entry flows.", de: "Billetterie hilft beim Veröffentlichen von Veranstaltungen, beim Verwalten von Anmeldungen, beim Versenden von Bestätigungen und bei der Organisation des Einlasses. Besonders hilfreich, wenn Teilnahmedaten in eigener Hand bleiben sollen.", es: "Billetterie permite publicar eventos, gestionar inscripciones, enviar confirmaciones y organizar la acogida. Resulta especialmente útil para conservar el control sobre los datos de asistencia y los flujos de entrada." }, replaces: { fr: "Eventbrite ou les formulaires d’inscription éparpillés.", en: "Eventbrite or scattered registration forms.", de: "Eventbrite oder verstreute Anmeldeformulare.", es: "Eventbrite o formularios de inscripción dispersos." } },
      benevalibre: { badge: "BV", art: "illustrations/butterfly-rainbow-glitter.gif", features: ["volunteers", "shifts", "followup"], thanks: "Bénévalibre and the communities that maintain free coordination tools for associations.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Coordonnez des créneaux, des missions et des personnes volontaires sans tableur qui déborde.", en: "Coordinate shifts, missions, and volunteers without an overflowing spreadsheet.", de: "Zeitslots, Aufgaben und Freiwillige koordinieren, ohne ausufernde Tabellen.", es: "Coordina turnos, misiones y personas voluntarias sin una hoja que se desborde." }, detail: { fr: "Bénévalibre aide les associations et équipes d’organisation à répartir des rôles, visualiser les disponibilités et garder une vue commune sur ce qu’il reste à pourvoir. C’est un outil très concret pour les événements ou permanences.", en: "Bénévalibre helps associations and organizing teams distribute roles, see availability, and keep a shared view of what still needs to be covered. It is a very practical tool for events and recurring shifts.", de: "Bénévalibre unterstützt Vereine und Organisationsteams dabei, Rollen zu verteilen, Verfügbarkeiten sichtbar zu machen und gemeinsam zu sehen, was noch offen ist. Sehr praktisch für Veranstaltungen und wiederkehrende Dienste.", es: "Bénévalibre ayuda a asociaciones y equipos organizadores a repartir roles, ver disponibilidades y mantener una visión común de lo que queda por cubrir. Es muy útil para eventos y turnos recurrentes." }, replaces: { fr: "Des tableaux de bénévoles bricolés à la main ou des chaînes de messages.", en: "Hand-built volunteer spreadsheets or long message chains.", de: "Handgebastelte Freiwilligen-Tabellen oder lange Nachrichtenketten.", es: "Hojas caseras de voluntariado o cadenas interminables de mensajes." } },
      anarchism: { badge: "AQ", art: "illustrations/text-angels-protection.png", features: ["reading", "archivesDocs", "references"], thanks: "The maintainers and authors behind An Anarchist FAQ and open radical archives.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Consultez une ressource documentaire ouverte pour lire, citer et retrouver des textes de référence.", en: "Browse an open documentation resource to read, quote, and revisit reference texts.", de: "Eine offene Dokumentationsquelle durchsuchen, um Referenztexte zu lesen, zu zitieren und wiederzufinden.", es: "Consulta un recurso documental abierto para leer, citar y volver a textos de referencia." }, detail: { fr: "Anarchism donne accès à une bibliothèque publique de textes et de repères théoriques. Le service sert surtout à lire au calme, retrouver une citation ou envoyer rapidement une ressource à d’autres personnes.", en: "Anarchism provides access to a public library of texts and theoretical references. It is mainly useful for calm reading, recovering a quote, or quickly sharing a resource with someone else.", de: "Anarchism bietet Zugang zu einer öffentlichen Sammlung von Texten und theoretischen Bezugspunkten. Nützlich zum ruhigen Lesen, zum Wiederfinden von Zitaten oder zum schnellen Teilen von Ressourcen.", es: "Anarchism da acceso a una biblioteca pública de textos y referencias teóricas. Sirve sobre todo para leer con calma, recuperar una cita o compartir rápidamente un recurso con otras personas." }, replaces: { fr: "Des recherches dispersées entre des archives peu lisibles.", en: "Scattered searches across archives that are hard to navigate.", de: "Verstreute Recherchen in schwer zugänglichen Archiven.", es: "Búsquedas dispersas entre archivos poco legibles." } },
      dokuwiki: { badge: "WK", art: "illustrations/divider-daisy-chain.gif", features: ["wiki", "protocols", "knowledgeBase"], thanks: "DokuWiki and the people maintaining sustainable, low-complexity documentation tools.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Documentez des pratiques, gardez des tutoriels internes et partagez une mémoire collective durable.", en: "Document practices, keep internal how-to pages, and share durable collective memory.", de: "Praktiken dokumentieren, interne Anleitungen festhalten und kollektives Wissen dauerhaft teilen.", es: "Documenta prácticas, guarda guías internas y comparte memoria colectiva duradera." }, detail: { fr: "Le Wiki sert à centraliser des procédures, des notes, des guides ou de la documentation d’équipe. Il est particulièrement pratique quand les informations importantes commencent à se perdre entre messages, pads et fichiers.", en: "The Wiki is useful for centralizing procedures, notes, guides, or team documentation. It becomes especially helpful when important information starts getting lost across messages, pads, and files.", de: "Das Wiki hilft dabei, Abläufe, Notizen, Leitfäden oder Team-Dokumentation zu zentralisieren. Besonders nützlich, wenn wichtige Informationen sonst in Nachrichten, Pads und Dateien verschwinden.", es: "El Wiki sirve para centralizar procedimientos, notas, guías o documentación de equipo. Resulta especialmente útil cuando la información importante empieza a perderse entre mensajes, pads y archivos." }, replaces: { fr: "Des dossiers partagés confus ou des notes éparpillées.", en: "Confusing shared folders or scattered notes.", de: "Unübersichtliche gemeinsame Ordner oder verstreute Notizen.", es: "Carpetas compartidas confusas o notas dispersas." } },
      widdypad: { badge: "WP", art: "illustrations/decor-jukebox.gif", features: ["music", "playlists", "gentleStreaming"], thanks: "The small custom WiddyPad experiments and the open audio tools that made them possible.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Explorez une bibliothèque musicale légère pensée pour l’écoute, les sélections et les ambiances partagées.", en: "Explore a lightweight music library designed for listening, selections, and shared moods.", de: "Eine leichte Musikbibliothek für Hören, kuratierte Auswahlen und geteilte Stimmungen erkunden.", es: "Explora una biblioteca musical ligera pensada para escuchar, seleccionar y compartir ambientes." }, detail: { fr: "WiddyPad est un espace d’écoute simple et un peu expérimental. Il permet de mettre en commun des morceaux, préparer des sélections ou ouvrir une ambiance sonore sans passer par une plateforme publicitaire.", en: "WiddyPad is a simple and slightly experimental listening space. It lets people gather tracks, prepare selections, or open a shared sound atmosphere without going through an ad-driven platform.", de: "WiddyPad ist ein einfach gehaltener, leicht experimenteller Hörraum. Dort lassen sich Stücke teilen, Auswahlen vorbereiten oder Klangatmosphären öffnen, ohne eine werbefinanzierte Plattform zu nutzen.", es: "WiddyPad es un espacio de escucha sencillo y un poco experimental. Permite reunir canciones, preparar selecciones o abrir una atmósfera sonora sin pasar por una plataforma publicitaria." }, replaces: { fr: "Des plateformes de streaming surchargées pour de petits usages partagés.", en: "Heavy streaming platforms for small, shared listening needs.", de: "Schwere Streaming-Plattformen für kleine gemeinsame Hörsituationen.", es: "Plataformas de streaming pesadas para pequeños usos compartidos." } },
      piped: { badge: "YT", art: "illustrations/wings-dragon.gif", features: ["videoPrivacy", "subscriptions", "watchLater"], thanks: "Piped and all the maintainers building privacy-respecting video frontends.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Regardez des vidéos en limitant le pistage, le bruit publicitaire et les recommandations intrusives.", en: "Watch videos while limiting tracking, ad noise, and intrusive recommendations.", de: "Videos ansehen und dabei Tracking, Werbelärm und aufdringliche Empfehlungen begrenzen.", es: "Mira vídeos limitando el rastreo, el ruido publicitario y las recomendaciones intrusivas." }, detail: { fr: "Piped sert à consulter YouTube avec une interface plus sobre et plus respectueuse de la vie privée. C’est utile pour suivre des contenus publics sans offrir en échange un profil complet à une régie publicitaire.", en: "Piped lets you browse YouTube through a calmer and more privacy-respecting interface. It is useful when you want to follow public video content without handing a full profile back to an ad ecosystem.", de: "Piped ermöglicht den Zugriff auf YouTube über eine ruhigere und datenschutzfreundlichere Oberfläche. So lassen sich öffentliche Videos verfolgen, ohne gleichzeitig ein komplettes Profil an ein Werbeökosystem zu liefern.", es: "Piped permite consultar YouTube desde una interfaz más sobria y respetuosa con la privacidad. Sirve para seguir contenidos públicos sin entregar a la vez un perfil completo a un ecosistema publicitario." }, replaces: { fr: "L’interface standard de YouTube.", en: "The standard YouTube interface.", de: "Die Standardoberfläche von YouTube.", es: "La interfaz estándar de YouTube." } },
      nitter: { badge: "Y", art: "illustrations/rose-red-single.gif", features: ["feeds", "privacyMirror", "veille"], thanks: "Nitter-like privacy frontends and everyone keeping public-web mirrors usable.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Lisez des comptes publics et faites de la veille sans vous connecter à la plateforme elle-même.", en: "Read public accounts and keep watch without logging into the platform itself.", de: "Öffentliche Accounts lesen und Monitoring betreiben, ohne sich bei der Plattform selbst einzuloggen.", es: "Lee cuentas públicas y haz seguimiento sin conectarte a la propia plataforma." }, detail: { fr: "Y permet de consulter des comptes publics ou des fils de veille avec moins de bruit et moins de dépendance à l’interface officielle. C’est surtout un service de lecture, pas de publication.", en: "Y is meant for reading public accounts and keeping an eye on feeds with less noise and less dependence on the official interface. It is primarily a reading tool, not a publishing one.", de: "Y dient zum Lesen öffentlicher Accounts und Beobachten von Feeds mit weniger Lärm und weniger Abhängigkeit von der offiziellen Oberfläche. Es ist vor allem ein Lese- und Beobachtungswerkzeug.", es: "Y está pensado para leer cuentas públicas y seguir hilos con menos ruido y menos dependencia de la interfaz oficial. Es sobre todo una herramienta de lectura, no de publicación." }, replaces: { fr: "L’interface officielle de X / Twitter pour la lecture publique.", en: "The official X / Twitter interface for public reading.", de: "Die offizielle X-/Twitter-Oberfläche für öffentliches Lesen.", es: "La interfaz oficial de X / Twitter para lectura pública." } },
      writefreely: { badge: "WF", art: "illustrations/text-email-fire.gif", features: ["blogging", "newsletters", "simpleEditing"], thanks: "WriteFreely and the maintainers preserving quiet publishing tools.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Publiez des textes, notes ou chroniques avec une interface légère qui laisse respirer l’écriture.", en: "Publish texts, notes, or chronicles in a lightweight interface that lets writing breathe.", de: "Texte, Notizen oder Chroniken in einer leichten Oberfläche veröffentlichen, die dem Schreiben Raum lässt.", es: "Publica textos, notas o crónicas en una interfaz ligera que deja respirar la escritura." }, detail: { fr: "WriteFreely sert à publier sans distraction, dans un format volontairement simple. Il convient bien aux carnets, journaux, annonces ou prises de parole qui n’ont pas besoin d’une usine à gaz éditoriale.", en: "WriteFreely is meant for distraction-free publishing through a deliberately simple workflow. It works especially well for notebooks, journals, announcements, or short-form publishing that does not need a heavy editorial machine.", de: "WriteFreely ist auf ablenkungsarmes Publizieren mit bewusst einfachem Ablauf ausgelegt. Besonders gut geeignet für Notizbücher, Journale, Ankündigungen oder kurze Texte ohne schwere Redaktionsmaschine.", es: "WriteFreely está pensado para publicar sin distracciones mediante un flujo deliberadamente simple. Funciona muy bien para cuadernos, diarios, anuncios o publicaciones breves que no necesitan una máquina editorial pesada." }, replaces: { fr: "Medium, Substack ou des CMS trop lourds pour un texte simple.", en: "Medium, Substack, or CMS tools that are too heavy for simple publishing.", de: "Medium, Substack oder CMS-Werkzeuge, die für einfache Texte zu schwer sind.", es: "Medium, Substack o CMS demasiado pesados para una publicación sencilla." } },
      wordpress: { badge: "WS", art: "illustrations/flowers-corner-decoration.gif", features: ["sites", "blogPages", "publishingFlow"], thanks: "WordPress and the huge open-source ecosystem around public web publishing.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Montez un site, une page projet ou un blog plus complet quand vous avez besoin d’une présence publique durable.", en: "Build a site, project page, or fuller blog when you need a durable public presence.", de: "Eine Website, Projektseite oder ein volleres Blog aufbauen, wenn eine dauerhafte öffentliche Präsenz gebraucht wird.", es: "Crea un sitio, una página de proyecto o un blog más completo cuando necesites una presencia pública duradera." }, detail: { fr: "Sites est l’option la plus souple pour construire une présence publique plus élaborée : pages, navigation, thèmes, extensions et contenus plus structurés. L’accès reste sur demande pour garder l’infrastructure saine.", en: "Sites is the most flexible option for building a fuller public presence: multiple pages, navigation, themes, plugins, and more structured content. Access stays on request to keep the infrastructure healthy.", de: "Sites ist die flexibelste Option für eine ausgebaute öffentliche Präsenz mit mehreren Seiten, Navigation, Themes, Erweiterungen und strukturierteren Inhalten. Der Zugang bleibt auf Anfrage, um die Infrastruktur stabil zu halten.", es: "Sites es la opción más flexible para construir una presencia pública más elaborada: varias páginas, navegación, temas, extensiones y contenidos más estructurados. El acceso sigue siendo bajo demanda para mantener sana la infraestructura." }, replaces: { fr: "Wix, WordPress.com ou des constructeurs de site fermés.", en: "Wix, WordPress.com, or closed website builders.", de: "Wix, WordPress.com oder geschlossene Website-Baukästen.", es: "Wix, WordPress.com o constructores cerrados de sitios." } },
      compteur_du_gase: { badge: "CG", art: "illustrations/icon-strawberry-basket.png", features: ["counters", "simpleStats", "stewardship"], thanks: "The local custom work behind the GASE counter and the people coordinating mutual-aid logistics.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Suivez des compteurs et des repères partagés pour un usage collectif très concret et local.", en: "Track shared counters and practical markers for very concrete local collective use.", de: "Gemeinsame Zähler und praktische Marker für sehr konkrete lokale Kollektivnutzung verfolgen.", es: "Sigue contadores y referencias compartidas para un uso colectivo muy concreto y local." }, detail: { fr: "Le compteur du GASE est un outil plus spécifique, pensé pour garder une vue simple sur des chiffres ou repères partagés au sein d’un cadre collectif. Il reste activé sur demande afin de préserver la pertinence des accès.", en: "Le compteur du GASE is a more specific tool designed to keep a simple view on shared numbers or markers inside a collective setting. It stays available on request so access remains relevant and manageable.", de: "Le compteur du GASE ist ein spezifischeres Werkzeug, das gemeinsame Zahlen oder Marker in einem kollektiven Rahmen übersichtlich sichtbar macht. Der Zugang bleibt auf Anfrage, damit die Nutzung sinnvoll und handhabbar bleibt.", es: "Le compteur du GASE es una herramienta más específica pensada para mantener una vista simple sobre cifras o referencias compartidas dentro de un marco colectivo. Se mantiene bajo demanda para que el acceso siga siendo pertinente y manejable." }, replaces: { fr: "Des tableaux manuels ou des suivis locaux éparpillés.", en: "Manual sheets or scattered local tracking.", de: "Manuelle Listen oder verstreute lokale Nachverfolgung.", es: "Hojas manuales o seguimientos locales dispersos." } },
      wallos: { badge: "WL", art: "illustrations/figure-runner-gold.gif", features: ["subscriptionsTrack", "recurringCosts", "budgetClarity"], thanks: "Wallos and the people building clear personal-finance tools without surveillance design.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Gardez une vue claire sur des abonnements et dépenses récurrentes sans tableur interminable.", en: "Keep a clear view of subscriptions and recurring costs without an endless spreadsheet.", de: "Abos und wiederkehrende Kosten klar im Blick behalten, ohne endlose Tabellen.", es: "Mantén una visión clara de suscripciones y gastos recurrentes sin una hoja interminable." }, detail: { fr: "Wallos aide à recenser les services payants, les renouvellements et les charges régulières afin d’éviter les oublis et d’avoir une vue d’ensemble plus nette. L’accès reste sur demande car l’outil manipule des informations plus sensibles.", en: "Wallos helps list paid services, renewals, and recurring charges so they stay visible over time. Access remains on request because the tool may involve more sensitive financial information.", de: "Wallos hilft dabei, bezahlte Dienste, Verlängerungen und regelmäßige Kosten übersichtlich sichtbar zu halten. Der Zugang bleibt auf Anfrage, weil dort auch sensiblere Finanzinformationen zusammenlaufen können.", es: "Wallos ayuda a listar servicios de pago, renovaciones y cargos recurrentes para mantenerlos visibles en el tiempo. El acceso sigue siendo bajo demanda porque puede implicar información financiera más sensible." }, replaces: { fr: "Les tableurs d’abonnements ou des rappels éparpillés.", en: "Subscription spreadsheets or scattered reminders.", de: "Abo-Tabellen oder verstreute Erinnerungen.", es: "Hojas de suscripciones o recordatorios dispersos." } },
      dynamicqrcode: { badge: "QR", art: "illustrations/divider-blue-squares.gif", features: ["qrCodes", "printableLinks", "redirections"], thanks: "Dynamic QR Code maintainers and the free web tooling around printed links.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Créez des QR codes modifiables dans le temps pour des affiches, flyers, menus ou parcours publics.", en: "Create QR codes that can change over time for posters, flyers, menus, or public paths.", de: "QR-Codes erstellen, die sich über die Zeit anpassen lassen, für Plakate, Flyer, Menüs oder öffentliche Wege.", es: "Crea códigos QR actualizables con el tiempo para carteles, folletos, menús o recorridos públicos." }, detail: { fr: "QR permet de fabriquer un code imprimable puis de faire évoluer sa destination plus tard, sans devoir tout réimprimer. C’est utile pour de la signalétique, des événements ou des documents déjà diffusés.", en: "QR lets you print a code once and change its destination later without reprinting everything. It is useful for signage, events, or any document that has already been distributed.", de: "QR erlaubt es, einen Code einmal zu drucken und sein Ziel später zu ändern, ohne alles neu zu drucken. Das ist nützlich für Beschilderung, Veranstaltungen oder bereits verteilte Dokumente.", es: "QR permite imprimir un código una sola vez y cambiar después su destino sin volver a imprimirlo todo. Resulta útil para señalética, eventos o documentos ya distribuidos." }, replaces: { fr: "Les générateurs de QR jetables ou impossibles à mettre à jour.", en: "Throwaway QR generators that cannot be updated later.", de: "Wegwerf-QR-Generatoren, die sich später nicht aktualisieren lassen.", es: "Generadores de QR desechables imposibles de actualizar después." } },
      bentopdf: { badge: "PDF", art: "illustrations/text-juice-3d.png", features: ["pdf", "split", "compress"], thanks: "Open PDF tooling and the packagers who keep self-hosted document utilities alive.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Fusionnez, découpez, compressez ou réorganisez des PDF sans passer par un site opaque.", en: "Merge, split, compress, or reorganize PDFs without relying on an opaque website.", de: "PDFs zusammenführen, aufteilen, komprimieren oder neu ordnen, ohne undurchsichtige Websites.", es: "Une, separa, comprime o reorganiza PDF sin depender de una web opaca." }, detail: { fr: "PDF Tools sert aux manipulations courantes autour des fichiers PDF : fusion, extraction, conversion légère ou réduction de taille. C’est un bon remplacement aux petits services web bardés de trackers.", en: "PDF Tools covers common PDF tasks: merging, extracting, light conversion, or reducing file size. It is a good alternative to small document websites filled with trackers.", de: "PDF Tools deckt typische PDF-Aufgaben ab: Zusammenführen, Extrahieren, leichte Konvertierung oder Größenreduktion. Eine gute Alternative zu kleinen Dokument-Websites voller Tracker.", es: "PDF Tools cubre tareas habituales con PDF: unir, extraer, convertir de forma ligera o reducir tamaño. Es una buena alternativa a pequeños sitios llenos de rastreadores." }, replaces: { fr: "iLovePDF, Smallpdf et autres utilitaires web intrusifs.", en: "iLovePDF, Smallpdf, and similar intrusive document sites.", de: "iLovePDF, Smallpdf und ähnliche aufdringliche Dokument-Websites.", es: "iLovePDF, Smallpdf y otros sitios intrusivos para documentos." } },
      faceprivacy: { badge: "FP", art: "illustrations/icon-scuba-diver.png", features: ["blur", "imageSafety", "privacyPrep"], thanks: "Face Privacy and the projects that make safer image sharing easier.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Préparez des images avant diffusion en masquant visages ou zones sensibles.", en: "Prepare images before sharing by hiding faces or other sensitive areas.", de: "Bilder vor dem Teilen vorbereiten, indem Gesichter oder sensible Bereiche verborgen werden.", es: "Prepara imágenes antes de compartirlas ocultando rostros o zonas sensibles." }, detail: { fr: "FacePrivacy aide à protéger des personnes ou des contextes avant publication d’une photo. L’outil est précieux pour des usages militants, associatifs, éducatifs ou tout simplement prudents.", en: "FacePrivacy helps protect people or contexts before a photo is published. It is especially valuable for activist, associative, educational, or simply cautious uses.", de: "FacePrivacy hilft dabei, Personen oder Situationen zu schützen, bevor ein Foto veröffentlicht wird. Besonders wertvoll für aktivistische, Vereins-, Bildungs- oder schlicht vorsichtige Kontexte.", es: "FacePrivacy ayuda a proteger a personas o contextos antes de publicar una foto. Es especialmente valiosa para usos activistas, asociativos, educativos o simplemente prudentes." }, replaces: { fr: "Des applications mobiles opaques pour flouter à la va-vite.", en: "Opaque mobile apps for quick face blurring.", de: "Undurchsichtige Mobile-Apps zum schnellen Verwischen.", es: "Aplicaciones opacas para difuminar deprisa desde el móvil." } },
      send: { badge: "SD", art: "illustrations/icon-treasure-chest.gif", features: ["fileDrop", "protectedLinks", "largeFiles"], thanks: "Send-inspired file-sharing tools and the people keeping temporary transfer services simple.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Partagez des fichiers ponctuellement avec des liens simples, temporaires et plus respectueux.", en: "Share files occasionally through simple, temporary, and more respectful links.", de: "Dateien punktuell über einfache, temporäre und respektvollere Links teilen.", es: "Comparte archivos puntualmente con enlaces simples, temporales y más respetuosos." }, detail: { fr: "Send est fait pour l’envoi ponctuel de documents ou médias trop volumineux pour l’e-mail. Le service privilégie des liens limités dans le temps et une expérience rapide, sans détour commercial.", en: "Send is made for occasional sharing of documents or media that are too large for email. It favors time-limited links and a quick experience without commercial detours.", de: "Send ist für das gelegentliche Teilen von Dokumenten oder Medien gedacht, die zu groß für E-Mail sind. Das Werkzeug setzt auf zeitlich begrenzte Links und eine schnelle, unkomplizierte Nutzung.", es: "Send está pensado para compartir de manera puntual documentos o medios demasiado grandes para el correo. Da prioridad a enlaces limitados en el tiempo y a una experiencia rápida, sin desvíos comerciales." }, replaces: { fr: "WeTransfer ou des pièces jointes trop lourdes.", en: "WeTransfer or oversized email attachments.", de: "WeTransfer oder zu große E-Mail-Anhänge.", es: "WeTransfer o adjuntos demasiado pesados." } },
      vert: { badge: "VT", art: "illustrations/tree-winter-bare.gif", features: ["convert", "formats", "quickExports"], thanks: "VERT.sh and the communities maintaining transparent conversion tools.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Convertissez rapidement des médias ou documents vers un format plus pratique, sans collecte inutile.", en: "Convert media or documents quickly into a more useful format without unnecessary data collection.", de: "Medien oder Dokumente schnell in passendere Formate umwandeln, ohne unnötige Datensammlung.", es: "Convierte medios o documentos con rapidez a formatos más prácticos, sin recopilación innecesaria." }, detail: { fr: "Convertisseur s’appuie sur VERT.sh pour transformer des fichiers audio, vidéo, image ou document vers des formats plus adaptés à un usage quotidien. C’est très utile pour préparer une diffusion ou alléger un fichier.", en: "Convertisseur relies on VERT.sh to turn audio, video, image, or document files into formats that fit everyday use better. It is very useful when preparing a publication or lightening a file.", de: "Convertisseur nutzt VERT.sh, um Audio-, Video-, Bild- oder Dokumentdateien in alltagstauglichere Formate umzuwandeln. Sehr nützlich für Veröffentlichungen oder das Verkleinern von Dateien.", es: "Convertisseur se apoya en VERT.sh para transformar archivos de audio, vídeo, imagen o documento en formatos más adecuados al uso cotidiano. Resulta muy útil para preparar una publicación o aligerar un archivo." }, replaces: { fr: "Des convertisseurs web opaques ou truffés de pub.", en: "Opaque or ad-heavy web converters.", de: "Undurchsichtige oder werbeüberladene Web-Konverter.", es: "Conversores web opacos o llenos de publicidad." } },
      grammalecte: { badge: "GR", art: "illustrations/text-i-love-you-hearts.gif", features: ["grammar", "spelling", "frenchWriting"], thanks: "Grammalecte and the people building free linguistic tools for French writing.", supported_languages: ["fr"], card: { fr: "Relisez des textes en français avec un correcteur libre, utile pour les brouillons comme pour les versions finales.", en: "Proofread French texts with a free grammar tool that helps on drafts and final versions alike.", de: "Französische Texte mit einem freien Grammatikwerkzeug für Entwürfe und Endfassungen prüfen.", es: "Revisa textos en francés con una herramienta libre útil tanto en borradores como en versiones finales." }, detail: { fr: "Grammalecte server propose une aide à la correction grammaticale et orthographique en français. C’est particulièrement pratique pour relire une annonce, un billet, un courrier ou une page avant publication.", en: "Grammalecte server offers grammar and spelling assistance for French writing. It is especially practical when proofreading an announcement, article, email, or page before publication.", de: "Der Grammalecte-Server bietet Grammatik- und Rechtschreibhilfe für französische Texte. Besonders praktisch für Ankündigungen, Artikel, Mails oder Seiten vor der Veröffentlichung.", es: "El servidor Grammalecte ofrece ayuda gramatical y ortográfica para escritura en francés. Resulta especialmente práctico para revisar un anuncio, artículo, correo o página antes de publicarla." }, replaces: { fr: "Des correcteurs cloud propriétaires pour le français.", en: "Proprietary cloud grammar checkers for French.", de: "Proprietäre Cloud-Korrekturdienste für Französisch.", es: "Correctores propietarios en la nube para francés." } },
      reader: { badge: "RD", art: "illustrations/decor-vine-heart.gif", features: ["reading", "archivesDocs", "references"], thanks: "FreshRSS Reader, RSS maintainers, and everyone keeping the open web readable without recommendation engines.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Suivez des flux, revues de presse et publications choisies dans un lecteur calme, sans algorithme intrusif.", en: "Follow feeds, reading lists, and selected publications in a calm reader without intrusive algorithms.", de: "Feeds, Presseschauen und ausgewählte Veröffentlichungen in einem ruhigen Reader ohne aufdringliche Algorithmen verfolgen.", es: "Sigue fuentes, selecciones y publicaciones en un lector tranquilo, sin algoritmos intrusivos." }, detail: { fr: "Reader rassemble vos flux RSS et sources suivies dans un espace de lecture stable. Il est pratique pour faire de la veille, lire des médias indépendants et remplacer les plateformes où l’ordre des contenus dépend d’une logique publicitaire.", en: "Reader gathers your RSS feeds and followed sources in a stable reading space. It is useful for watch work, reading independent media, and replacing platforms where content order is driven by advertising logic.", de: "Reader bündelt RSS-Feeds und abonnierte Quellen in einem stabilen Leseraum. Das ist praktisch für Monitoring, unabhängige Medien und als Ersatz für Plattformen, deren Reihenfolge von Werbelogik bestimmt wird.", es: "Reader reúne tus fuentes RSS y publicaciones seguidas en un espacio de lectura estable. Resulta útil para la vigilancia informativa, para leer medios independientes y para sustituir plataformas cuyo orden depende de la lógica publicitaria." }, replaces: { fr: "Feedly ou les fils sociaux utilisés comme revue de presse.", en: "Feedly or social feeds used as a press digest.", de: "Feedly oder soziale Feeds als Pressespiegel.", es: "Feedly o los feeds sociales usados como revista de prensa." } },
      immich: { badge: "IM", art: "illustrations/flowers-corner-decoration.gif", features: ["imageSafety", "archivesDocs", "references"], thanks: "Immich, its contributors, and the free software communities building self-hosted photo archives.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Rangez, retrouvez et partagez des photos ou vidéos dans une galerie privée pensée pour garder la main sur vos archives.", en: "Store, find, and share photos or videos in a private gallery built to keep your archives under your control.", de: "Fotos und Videos in einer privaten Galerie speichern, wiederfinden und teilen, damit das Archiv unter eigener Kontrolle bleibt.", es: "Guarda, encuentra y comparte fotos o vídeos en una galería privada pensada para mantener el control de tus archivos." }, detail: { fr: "Immich sert d’espace photo et vidéo personnel ou collectif pour conserver des souvenirs, documenter des activités ou préparer des partages choisis. C’est une bonne alternative à Google Photos ou iCloud quand on veut un hébergement maîtrisé.", en: "Immich works as a personal or collective photo and video space to preserve memories, document activities, or prepare selective sharing. It is a strong alternative to Google Photos or iCloud when you want controlled hosting.", de: "Immich dient als persönlicher oder gemeinsamer Foto- und Video-Speicher, um Erinnerungen zu bewahren, Aktivitäten zu dokumentieren oder gezielte Freigaben vorzubereiten. Es ist eine gute Alternative zu Google Fotos oder iCloud.", es: "Immich funciona como espacio personal o colectivo para fotos y vídeos, útil para conservar recuerdos, documentar actividades o preparar comparticiones selectivas. Es una buena alternativa a Google Photos o iCloud cuando se busca un alojamiento controlado." }, replaces: { fr: "Google Photos, iCloud Photos ou des dossiers dispersés.", en: "Google Photos, iCloud Photos, or scattered folders.", de: "Google Fotos, iCloud Fotos oder verstreute Ordner.", es: "Google Photos, iCloud Photos o carpetas dispersas." } },
      funkwhale: { badge: "FW", art: "illustrations/decor-jukebox.gif", features: ["music", "playlists", "gentleStreaming"], thanks: "Funkwhale, fediverse audio communities, and the maintainers keeping music sharing open.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Écoutez de la musique dans une interface sobre, créez des playlists et gardez une bibliothèque plus indépendante.", en: "Listen to music in a sober interface, build playlists, and keep a more independent library.", de: "Musik in einer ruhigen Oberfläche hören, Playlists anlegen und eine unabhängigere Bibliothek behalten.", es: "Escucha música en una interfaz sobria, crea listas y mantén una biblioteca más independiente." }, detail: { fr: "Funkwhale permet d’écouter, d’organiser et parfois de partager des bibliothèques musicales sans dépendre d’une plateforme fermée. Il convient bien aux personnes ou équipes qui veulent garder leurs écoutes dans un environnement plus ouvert.", en: "Funkwhale lets you listen to, organize, and sometimes share music libraries without depending on a closed platform. It suits people or teams who want to keep listening habits in a more open environment.", de: "Mit Funkwhale lassen sich Musikbibliotheken hören, organisieren und teils teilen, ohne von einer geschlossenen Plattform abhängig zu sein. Geeignet für Menschen oder Teams, die ein offeneres Umfeld möchten.", es: "Funkwhale permite escuchar, organizar y a veces compartir bibliotecas musicales sin depender de una plataforma cerrada. Va bien para personas o equipos que quieren un entorno más abierto para sus escuchas." }, replaces: { fr: "Spotify ou des bibliothèques musicales enfermées dans un service unique.", en: "Spotify or music libraries locked into a single service.", de: "Spotify oder Musikbibliotheken, die an einen einzelnen Dienst gebunden sind.", es: "Spotify o bibliotecas musicales encerradas en un único servicio." } },
      nodered: { badge: "NR", art: "illustrations/wings-dragon.gif", features: ["redirections", "simpleStats", "stewardship"], thanks: "Node-RED and the maker communities building transparent automations instead of opaque SaaS glue.", supported_languages: ["fr", "en", "de", "es"], card: { fr: "Assemblez des automatisations, des passerelles et des petits flux utiles sans repartir de zéro en code.", en: "Assemble automations, bridges, and useful little flows without rebuilding everything in code.", de: "Automationen, Brücken und nützliche kleine Abläufe zusammenstellen, ohne alles neu zu programmieren.", es: "Monta automatizaciones, pasarelas y pequeños flujos útiles sin rehacerlo todo en código." }, detail: { fr: "Nodes sert à relier des services, déclencher des actions, transformer des données ou prototyper des automatisations locales. L’accès reste sur demande parce que ce type d’outil peut agir sur le reste de l’infrastructure.", en: "Nodes is useful for connecting services, triggering actions, transforming data, or prototyping local automations. Access stays on request because this kind of tool can interact with the rest of the infrastructure.", de: "Nodes dient dazu, Dienste zu verbinden, Aktionen auszulösen, Daten umzuwandeln oder lokale Automationen zu prototypisieren. Der Zugang bleibt auf Anfrage, weil dieses Werkzeug auf andere Teile der Infrastruktur einwirken kann.", es: "Nodes sirve para conectar servicios, lanzar acciones, transformar datos o prototipar automatizaciones locales. El acceso sigue siendo bajo demanda porque este tipo de herramienta puede interactuar con el resto de la infraestructura." }, replaces: { fr: "Zapier ou des scripts locaux dispersés.", en: "Zapier or scattered local scripts.", de: "Zapier oder verstreute lokale Skripte.", es: "Zapier o scripts locales dispersos." } }
