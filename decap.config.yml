backend:
  name: gitea
  repo: micou/micou-site
  app_id: ""
  api_root: https://git.micou.org/api/v1
  base_url: https://git.micou.org
  auth_endpoint: oauth/authorize

media_folder: "static/media"
public_folder: "/media"

publish_mode: editorial_workflow

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - file: "site_content.json"
        label: "Site Content"
        name: "site_content"
        fields:
          - label: "Homepage"
            name: "homepage"
            widget: "object"
            fields:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - label: "French"
                    name: "fr"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Tagline", name: "tagline", widget: "text" }
                  - label: "English"
                    name: "en"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Tagline", name: "tagline", widget: "text" }
                  - label: "German"
                    name: "de"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Tagline", name: "tagline", widget: "text" }
                  - label: "Spanish"
                    name: "es"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Tagline", name: "tagline", widget: "text" }
              - { label: "Support Email", name: "support_email", widget: "string" }
          - label: "Blog"
            name: "blog"
            widget: "object"
            fields:
              - { label: "Enabled", name: "enabled", widget: "boolean", default: false }
              - { label: "Repo URL", name: "repo_url", widget: "string", required: false }
              - { label: "Editor Mode", name: "editor_mode", widget: "string", default: "git-backed" }
          - label: "Pages"
            name: "pages"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Editor", name: "editor", widget: "string" }
              - { label: "Repo URL", name: "repo_url", widget: "string", required: false }
