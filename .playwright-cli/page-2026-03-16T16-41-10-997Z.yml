      - paragraph [ref=e780]: Geschützte Werkzeuge · freie Softwarekultur · sorgfältig selbstverwaltete Infrastruktur
  - generic [ref=e14]:
    - generic [ref=e781]:
      - heading "Gestalten, organisieren" [level=2] [ref=e782]:
        - generic [ref=e783]: Gestalten, organisieren
      - paragraph [ref=e784]: "micou.org stellt mit Sorgfalt gepflegte Werkzeuge für Künstler*innen, Kreative, Aktivist*innen, Vereine, Kollektive und alle Menschen bereit, die sicherere digitale Räume brauchen. Es geht um konkrete Möglichkeiten: schreiben, teilen, organisieren, veröffentlichen, zusammenarbeiten und archivieren, ohne von geschlossenen Ökosystemen oder zentralisierten Anbietern abhängig zu sein."
      - paragraph [ref=e785]: Private Räume sind hier nicht nur ein Versprechen. Die Infrastruktur soll Autonomie, Vertraulichkeit, Zugänglichkeit und offene Rahmen stärken und zugleich freundlich für Menschen bleiben, die im Alltag verlässliche Werkzeuge brauchen.
    - generic [ref=e786]:
      - link "Mein Panel" [ref=e787] [cursor=pointer]:
        - /url: /yunohost/sso/
      - link "Zugang anfragen" [ref=e788] [cursor=pointer]:
        - /url: "#access-form"
    - paragraph [ref=e789]: Schon Mitglied? Über den Button Mein Panel öffnest du direkt deinen persönlichen Bereich mit allen bereits für dich aktivierten Diensten.
    - generic [ref=e790]:
      - article [ref=e791]:
        - strong [ref=e793]: Echte Vertraulichkeit
        - paragraph [ref=e794]: Private Bereiche bleiben den berechtigten Personen vorbehalten. Daten werden verschlüsselt übertragen und profitieren, wenn die Software es erlaubt, von stärkerem Ende-zu-Ende-Schutz.
      - article [ref=e795]:
        - strong [ref=e797]: Lebenslang kostenlos*
        - paragraph [ref=e798]: "Alle Dienste auf micou.org sind kostenlos nutzbar: keine Abo-Schranke, keine künstlich beschnittene Version und keine zusätzliche Werbung."
      - article [ref=e799]:
        - strong [ref=e801]: No-AI-Prinzip
        - paragraph [ref=e802]: Standardmäßig ist kein KI-Cloud-Dienst eingebunden. Das begrenzt Datenauswertung, intransparente Abhängigkeiten und Umweltbelastung.
    - generic [ref=e803]: "* Um die Plattform vor Spam, Angriffen und Missbrauch zu schützen, werden einige ressourcenintensivere Werkzeuge auf Anfrage freigeschaltet. Das Formular unten ist für Einzelpersonen oder Teams nur eine einfache Formalität. Anfragen werden angenommen, solange der Server nicht vorübergehend an seine Grenzen stößt, und die Infrastruktur wird weiter ausgebaut."
    - generic [ref=e804]:
      - generic [ref=e805]:
        - heading "Unterstützung" [level=3] [ref=e806]
        - paragraph [ref=e807]: Alle Dienste auf micou.org sind und bleiben lebenslang kostenlos nutzbar. Wenn du trotzdem die Kosten des Servers mittragen möchtest, kannst du über diesen schönen Button einen Beitrag anbieten. Jede Hilfe ist willkommen, aber niemals Pflicht; gib nur etwas, wenn du es sicher und entspannt tun kannst. 100% der Beiträge fließen in Entwicklung und Online-Wartung dieser Infrastruktur.
      - link "Beitragen" [ref=e808] [cursor=pointer]:
        - /url: mailto:micou@micou.org?subject=Contribution%20micou.org
