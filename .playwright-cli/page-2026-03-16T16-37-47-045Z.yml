    - generic [ref=e14]:
      - generic [ref=e781]:
        - heading "Créer, s’organiser" [level=2] [ref=e782]:
          - generic [ref=e783]: Créer, s’organiser
        - paragraph [ref=e784]: "micou.org met à disposition, avec soin et enthousiasme, des outils pour artistes, créateur·ices, activistes, associations, collectifs et personnes qui ont besoin d’espaces numériques plus sûrs. L’objectif est de rendre possibles des usages concrets : écrire, partager, organiser, publier, collaborer et archiver, sans dépendre d’écosystèmes fermés ni de fournisseurs centralisés."
        - paragraph [ref=e785]: Ici, les espaces privés comptent vraiment. L’infrastructure cherche à préserver l’autonomie, la confidentialité, l’accès et l’usage de cadres ouverts, tout en restant simple d’accès pour celles et ceux qui ont besoin d’outils fiables au quotidien.
      - generic [ref=e786]:
        - link "Mon Panel" [ref=e787] [cursor=pointer]:
          - /url: /yunohost/sso/
        - link "Demander un accès" [ref=e788] [cursor=pointer]:
          - /url: "#access-form"
      - paragraph [ref=e789]: "Déjà membre ? Le bouton Mon Panel ouvre directement votre espace personnel : vous y retrouvez les services déjà activés pour vous."
      - generic [ref=e790]:
        - article [ref=e791]:
          - strong [ref=e793]: Confidentialité réelle
          - paragraph [ref=e794]: Vos espaces privés restent réservés aux personnes autorisées. Les données circulent chiffrées et, quand l’outil le permet, bénéficient d’une protection renforcée de bout en bout.
        - article [ref=e795]:
          - strong [ref=e797]: Gratuit à vie*
          - paragraph [ref=e798]: "Tous les services proposés sur micou.org sont gratuits à utiliser : aucun abonnement, aucune version bridée, aucune publicité ajoutée."
        - article [ref=e799]:
          - strong [ref=e801]: Principe No-AI
          - paragraph [ref=e802]: Aucun service cloud d’IA n’est intégré par défaut. Cela limite la collecte de données, les dépendances opaques et l’impact environnemental.
      - generic [ref=e803]: "* Pour protéger la plateforme contre le spam, les attaques et les usages abusifs, certains outils plus gourmands sont activés sur demande. Il suffit de remplir le formulaire plus bas, en individuel ou pour une équipe : c’est une simple formalité. Les demandes sont acceptées sauf si la capacité du serveur est temporairement atteinte, et l’infrastructure continue d’être renforcée pour accueillir davantage de monde."
      - generic [ref=e804]:
        - generic [ref=e805]:
          - heading "Appel aux dons" [level=3] [ref=e806]
          - paragraph [ref=e807]: L’usage de tous les services proposés sur micou.org est et restera gratuit à vie. Si vous souhaitez néanmoins soutenir les frais liés au maintien du serveur, vous pouvez cliquer sur ce joli bouton pour contribuer. Toute aide est bienvenue mais jamais obligatoire ; ne donnez que si vous êtes sûr·e de pouvoir le faire. 100% des dons sont consacrés au développement et à la maintenance en ligne de cette infrastructure.
        - link "Contribuer" [ref=e808] [cursor=pointer]:
          - /url: mailto:micou@micou.org?subject=Contribution%20micou.org
