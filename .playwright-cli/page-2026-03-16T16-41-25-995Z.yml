  - generic [ref=e14]:
    - generic [ref=e1544]:
      - heading "Crear, organizarse" [level=2] [ref=e1545]:
        - generic [ref=e1546]: Crear, organizarse
      - paragraph [ref=e1547]: "micou.org ofrece herramientas cuidadas para artistas, creadorxs, activistas, asociaciones, colectivos y personas que necesitan espacios digitales más seguros. La idea es muy concreta: permitir escribir, compartir, organizar, publicar, colaborar y archivar sin depender de ecosistemas cerrados ni de proveedores centralizados."
      - paragraph [ref=e1548]: Aquí los espacios privados importan de verdad. La infraestructura busca sostener autonomía, confidencialidad, accesibilidad y marcos abiertos, sin dejar de ser acogedora para quienes necesitan herramientas fiables en el día a día.
    - generic [ref=e1549]:
      - link "Mi panel" [ref=e1550] [cursor=pointer]:
        - /url: /yunohost/sso/
      - link "Solicitar acceso" [ref=e1551] [cursor=pointer]:
        - /url: "#access-form"
    - paragraph [ref=e1552]: ¿Ya eres miembro? El botón Mi panel abre directamente tu espacio personal con los servicios que ya tienes activados.
    - generic [ref=e1553]:
      - article [ref=e1554]:
        - strong [ref=e1556]: Privacidad real
        - paragraph [ref=e1557]: Los espacios privados quedan reservados a las personas autorizadas. Los datos circulan cifrados y, cuando la herramienta lo permite, cuentan con una protección reforzada de extremo a extremo.
      - article [ref=e1558]:
        - strong [ref=e1560]: Gratis para siempre*
        - paragraph [ref=e1561]: "Todos los servicios de micou.org son gratuitos: sin muro de suscripción, sin versión recortada y sin publicidad añadida."
      - article [ref=e1562]:
        - strong [ref=e1564]: Principio No-AI
        - paragraph [ref=e1565]: No se integra por defecto ningún servicio de IA en la nube. Esto limita la extracción de datos, las dependencias opacas y el impacto ambiental.
    - generic [ref=e1566]: "* Para proteger la plataforma frente al spam, los ataques y los usos abusivos, algunas herramientas que consumen más recursos se activan bajo demanda. El formulario de abajo, para personas o equipos, es solo una formalidad sencilla. Las solicitudes se aceptan salvo cuando el servidor está temporalmente cerca de su límite, y la infraestructura sigue ampliándose."
    - generic [ref=e1567]:
      - generic [ref=e1568]:
        - heading "Llamado a contribuciones" [level=3] [ref=e1569]
        - paragraph [ref=e1570]: El uso de todos los servicios ofrecidos en micou.org es y seguirá siendo gratuito de por vida. Si aun así deseas ayudar a cubrir los gastos del servidor, puedes pulsar este bonito botón para contribuir. Toda ayuda es bienvenida pero nunca obligatoria; dona solo si sabes que puedes hacerlo con tranquilidad. El 100% de las donaciones se dedica al desarrollo y al mantenimiento en línea de esta infraestructura.
      - link "Contribuir" [ref=e1571] [cursor=pointer]:
        - /url: mailto:micou@micou.org?subject=Contribution%20micou.org
