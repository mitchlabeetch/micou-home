        - generic [ref=e17]: Create, organize
      - paragraph [ref=e18]: "micou.org offers carefully maintained tools for artists, creators, activists, associations, collectives, and anyone who needs safer digital spaces. The goal is practical: to help people write, share, organize, publish, collaborate, and archive without depending on closed ecosystems or centralized providers."
      - paragraph [ref=e19]: Private space matters here. The infrastructure is meant to support autonomy, confidentiality, accessibility, and open frameworks while staying welcoming for people who need reliable tools in everyday work.
    - generic [ref=e20]:
      - link "My Panel" [ref=e21] [cursor=pointer]:
        - /url: /yunohost/sso/
      - link "Request access" [ref=e22] [cursor=pointer]:
        - /url: "#access-form"
    - paragraph [ref=e23]: Already a member? The My Panel button opens your personal space directly, with every service already enabled for you.
    - generic [ref=e24]:
      - article [ref=e25]:
        - strong [ref=e27]: Real privacy
        - paragraph [ref=e28]: Private areas stay limited to the people who are allowed to access them. Data travels encrypted and, when the software supports it, benefits from stronger end-to-end protection.
      - article [ref=e29]:
        - strong [ref=e31]: Free to use for life*
        - paragraph [ref=e32]: "Every service on micou.org is free to use: no subscription wall, no artificially limited tier, and no added advertising."
      - article [ref=e33]:
        - strong [ref=e35]: No-AI principle
        - paragraph [ref=e36]: No cloud AI service is integrated by default. This reduces data extraction, opaque dependencies, and environmental impact.
    - generic [ref=e37]: "* To protect the platform against spam, attacks, and misuse, a few more resource-intensive tools are enabled on request. Filling out the form below as an individual or a team is only a simple formality. Requests are accepted unless the server is temporarily close to capacity, and the infrastructure keeps being improved to welcome more people."
    - generic [ref=e38]:
      - generic [ref=e39]:
        - heading "Support the server" [level=3] [ref=e40]
        - paragraph [ref=e41]: Every service offered on micou.org is, and will remain, free to use for life. If you still wish to help cover the cost of keeping the server online, you can click this button to contribute. Any help is welcome but never required; only give if you are sure you comfortably can. 100% of donations go to the development and maintenance of this infrastructure.
