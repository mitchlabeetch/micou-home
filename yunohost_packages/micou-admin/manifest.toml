#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "micou-admin"
name = "micou admin"
description.en = "Admin-only control plane for the micou.org registry, content, and access model"
description.fr = "Plan de contrôle réservé à l'administration pour le registre, les contenus et les accès de micou.org"

version = "0.1.0~ynh1"

maintainers = ["micou"]

[upstream]
license = "AGPL-3.0-only"
website = "https://micou.org/admin"
admindoc = "https://micou.org/admin"
userdoc = "https://micou.org/admin"
code = "https://micou.org/admin"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = true

disk = "5M"
ram.build = "5M"
ram.runtime = "20M"

[install]
    [install.domain]
    type = "domain"
    default = "micou.org"

    [install.path]
    type = "path"
    default = "/admin"

    [install.init_main_permission]
    type = "group"
    default = "admins"

[resources]
    [resources.permissions]
    main.url = "/"
