#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "webstudio-workspace"
name = "Webstudio workspace"
description.en = "Admin-only shortcut route for the micou public-page editing workspace"
description.fr = "Route raccourci réservée à l'administration pour l'espace d'édition des pages publiques micou"

version = "0.1.0~ynh1"

maintainers = ["micou"]

[upstream]
license = "AGPL-3.0-only"
website = "https://studio.micou.org/"
admindoc = "https://docs.webstudio.is/university/self-hosting"
userdoc = "https://docs.webstudio.is/university/self-hosting"
code = "https://studio.micou.org/"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = true

disk = "1M"
ram.build = "1M"
ram.runtime = "5M"

[install]
    [install.domain]
    type = "domain"
    default = "studio.micou.org"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    default = "admins"

[resources]
    [resources.permissions]
    main.url = "/"
